name: tests

on:
  push:
    branches: [main]
  pull_request: {}

jobs:
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: 'npm'
      - run: npm ci
      - name: Unit tests
        run: npm test
      - name: Typecheck (api)
        run: npx tsc -p apps/api/tsconfig.json --noEmit
      - name: Typecheck (web)
        run: npx tsc -p apps/web/tsconfig.json --noEmit
      - name: Typecheck (packages)
        run: |
          npx tsc -p packages/ad-connectors/tsconfig.json --noEmit
          npx tsc -p packages/ai-router/tsconfig.json --noEmit
